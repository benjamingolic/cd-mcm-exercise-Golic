# golangci-lint configuration
# Reference: https://golangci-lint.run/usage/configuration/

version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - gosimple
    - gocyclo
    - misspell
    - gocritic
  settings: # <- Hierhin verschoben!
    errcheck:
      check-type-assertions: true

formatters:
  enable:
    - gofmt

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck