name: CI

on:
  push:
    branches: [main, "exercise/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        go-version: ["1.25", "1.26"]
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Download dependencies
        run: go mod download

      - name: Run tests with coverage
        run: go test -v -coverprofile=coverage.out ./...

      - name: Check coverage threshold # (≥ 80%)
        run: |
          head -1 coverage.out > coverage_filtered.out
          tail -n +2 coverage.out | grep -vE "postgres|cmd" >> coverage_filtered.out
          go tool cover -html=coverage_filtered.out -o coverage.html
          TOTAL=$(go tool cover -func=coverage_filtered.out | grep total | awk '{print $NF}' | tr -d '%')
          echo "Coverage (excluding DB files): ${TOTAL}%"
          if [ "$(echo "$TOTAL < 80" | bc)" -eq 1 ]; then
            echo "::error::Coverage ${TOTAL}% is below the 80% threshold"
            exit 1
          fi

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}-go${{ matrix.go-version }}
          path: |
            coverage.out
            coverage_filtered.out
            coverage.html

      - name: Build
        run: go build -o api-server ./cmd/api

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: "v2.12.2"
          args: --config .golangci.yml

  docker-build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: product-catalog:${{ github.sha }}

  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-ubuntu-latest-go1.26

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@a31c9398be7ace6bbfaf30c0bd5d415f843d45e9 # v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
